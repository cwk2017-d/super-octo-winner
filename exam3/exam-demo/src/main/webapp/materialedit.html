<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>修改物资类别基本信息</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eeeeee; /* 淡蓝色背景 */
            margin: 0;
            display: flex;
            flex-direction: column; /* 使用列布局 */
            align-items: center; /* 水平居中 */
            justify-content: flex-start; /* 从顶部开始排列 */
            height: 100vh;
        }
        h1 {
            margin: 20px 0; /* 添加上下外边距，使标题与内容之间有间隔 */
            font-size: 50px; /* 标题字体大小 */
            color: #333; /* 标题颜色 */
        }

    </style>
</head>
<body>
<h1>修改物资类别基本信息</h1>
<form action="/exam-demo/materialedit" method="post">
    <p>要修改的物资编号<input type="number" id="number" name="number"></p>
    请输入要修改的信息:
    <p>物资分类<input type="text" id="wuzifenlei" name="wuzifenlei"></p>
    <p>物资名称<input type="text" id="name" name="name"></p>
    <p>物资规格<input type="text" id="guige" name="guige"></p>
    <p>物资材质<input type="text" id="caizhi" name="caizhi"></p>
    <input type="submit">
</form>
</body>
</html>
