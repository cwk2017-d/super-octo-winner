<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>仓库新增</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eeeeee; /* 淡蓝色背景 */

            align-items: center; /* 水平居中 */

        }

            margin: 20px 0; /* 添加上下外边距，使标题与内容之间有间隔 */
            font-size: 50px; /* 标题字体大小 */
            color: #333; /* 标题颜色 */
        }

    </style>
</head>
<body>
<h1>仓库新增</h1>
<form action="/exam-demo/warehouseadd" method="post">
   <p>物资编码<input type="number" id="id" name="id"></p>

    <p>物资规格<input type="text" id="guige" name="guige"></p>
    <p>物资材质<input type="text" id="caizhi" name="caizhi"></p>
    <p>供应商<input type="text" id="gongyingshang" name="gongyingshang"></p>
    <p>品牌<input type="text" id="logo" name="logo"></p>
    <p>物资分类<input type="text" id="wuzufenlei" name="wuzifenlei"></p>
    <input type="submit" >
</form>

</html>
